</head>
<body>

<header class="site-header">
  <div class="container nav">
    <a class="brand" href="index.html"><img class="brand-logo" src="logo.svg" alt="PatientFlow — by Crea8iv Media"></a>
    <button class="nav-toggle" aria-label="Toggle menu">☰</button>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="features.html">Features</a>
      <a href="pricing.html">Pricing</a>
      <a href="industries.html">Industries</a>
      <a href="demo.html">Demo</a>
      <a href="contact.html">Contact</a>
    </nav>
    <a class="nav-cta" href="demo.html">Book Demo</a>
  </div>
</header>

<section class="page-hero">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="container">
    <span class="eyebrow reveal"><span class="dot"></span> Live Walkthrough</span>
    <h1 class="reveal d1">See PatientFlow <span class="text-grad">in action.</span></h1>
    <p class="reveal d2">A 20-minute personal demo on WhatsApp video or Zoom — we show your exact use case, not a sales pitch.</p>
  </div>
</section>

<section class="section" style="padding-top:20px;">
  <div class="container">
    <form class="form-card reveal d1" data-lead-form="demo">
      <div class="form-grid">
        <div class="field"><label>Clinic Name *</label><input name="clinicName" required placeholder="e.g. City Dental Care"></div>
        <div class="field"><label>Your Name *</label><input name="contactName" required placeholder="e.g. Dr Ali Raza"></div>
        <div class="field"><label>Email *</label><input name="email" type="email" required placeholder="you@clinic.com"></div>
        <div class="field"><label>Phone / WhatsApp *</label><input name="phone" required placeholder="+92 300 1234567"></div>
        <div class="field"><label>Clinic Type</label>
          <select name="clinicType">
            <option value="dental">Dental</option>
            <option value="aesthetic">Aesthetic</option>
            <option value="medical">Medical</option>
            <option value="multi">Multi-specialty</option>
          </select>
        </div>
        <div class="field"><label>City</label><input name="city" placeholder="e.g. Rawalpindi"></div>
        <div class="field full"><label>What do you want to see?</label><textarea name="message" rows="3" placeholder="e.g. WhatsApp reactivation campaigns and ROI tracking"></textarea></div>
      </div>
      <div class="form-msg"></div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:22px;">Book My Free Demo →</button>
    </form>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-bottom" style="border-top:0;margin-top:0;padding-top:0;">
    <span>© 2026 PatientFlow by Crea8iv Media. All rights reserved.</span>
    <span><a href="index.html">Home</a></span>
  </div>
</footer>

<script src="js/site.js"></script>
