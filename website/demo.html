<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Demo — Crea8iv PatientFlow</title>
<meta name="description" content="Book a free live demo of Crea8iv PatientFlow — see appointments, WhatsApp CRM and billing on a real clinic setup.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container nav">
    <a class="brand" href="index.html"><span class="brand-mark">PF</span><span>PatientFlow<small>by Crea8iv</small></span></a>
    <button class="nav-toggle" aria-label="Menu">☰</button>
    <nav class="nav-links">
      <a href="features.html">Features</a>
      <a href="pricing.html">Pricing</a>
      <a href="industries.html">Industries</a>
      <a href="demo.html">Request Demo</a>
      <a href="contact.html">Contact</a>
      <a class="nav-cta" href="register.html">REGISTER YOUR CLINIC</a>
    </nav>
  </div>
</header>

<section class="hero" style="padding:70px 0 40px;">
  <div class="container" style="text-align:center;">
    <span class="eyebrow">Live Walkthrough</span>
    <h1 style="margin:0 auto;">See PatientFlow <span class="grad-text">in action.</span></h1>
    <p class="lead" style="margin-left:auto;margin-right:auto;">A 20-minute personal demo on WhatsApp video or Zoom — we show your exact use case, not a sales pitch.</p>
  </div>
</section>

<section class="section" style="padding-top:20px;">
  <div class="container">
    <form class="form-card" data-lead-form="demo">
      <div class="form-grid">
        <div class="field"><label>Clinic Name *</label><input name="clinicName" required placeholder="e.g. City Dental Care"></div>
        <div class="field"><label>Your Name *</label><input name="contactName" required placeholder="e.g. Dr Ali Raza"></div>
        <div class="field"><label>Email *</label><input name="email" type="email" required placeholder="you@clinic.com"></div>
        <div class="field"><label>Phone / WhatsApp *</label><input name="phone" required placeholder="+92 300 1234567"></div>
        <div class="field"><label>Clinic Type</label>
          <select name="clinicType">
            <option value="dental">Dental</option>
            <option value="aesthetic">Aesthetic</option>
            <option value="medical">Medical</option>
            <option value="multi">Multi-specialty</option>
          </select>
        </div>
        <div class="field"><label>City</label><input name="city" placeholder="e.g. Rawalpindi"></div>
        <div class="field full"><label>What do you want to see?</label><textarea name="message" rows="3" placeholder="e.g. WhatsApp reminders and billing"></textarea></div>
      </div>
      <div class="form-msg"></div>
      <button type="submit" class="btn btn-primary" style="margin-top:22px;width:100%;justify-content:center;">BOOK MY FREE DEMO →</button>
    </form>
  </div>
</section>

<footer class="site-footer" style="margin-top:30px;">
  <div class="container footer-bottom" style="border-top:0;margin-top:0;padding-top:0;">
    <span>© 2026 Crea8iv PatientFlow. All rights reserved.</span>
    <span><a href="index.html">Home</a></span>
  </div>
</footer>

<script src="js/site.js"></script>
</body>
</html>
