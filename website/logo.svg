<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 150" role="img" aria-label="PatientFlow — Acquire, Convert, Care">
  <!-- speed lines -->
  <g fill="#FE6A09">
    <rect x="16" y="40" width="34" height="10" rx="5"/>
    <rect x="6"  y="62" width="48" height="10" rx="5"/>
    <rect x="22" y="84" width="28" height="10" rx="5"/>
  </g>
  <!-- P mark -->
  <path d="M86 126 V28 H120 a32 32 0 0 1 0 64 H86" fill="none" stroke="#FE6A09" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M104 126 V44" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.92"/>
  <!-- wordmark -->
  <text x="176" y="90" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="56" letter-spacing="2"><tspan fill="#FFFFFF">PATIENT</tspan><tspan fill="#FE6A09">FLOW</tspan></text>
  <!-- tagline -->
  <text x="180" y="120" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="14" letter-spacing="6" fill="#8A847C">ACQUIRE &#8226; CONVERT &#8226; CARE</text>
