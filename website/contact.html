<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — PatientFlow | Sales, Support &amp; Partnerships</title>
<meta name="description" content="Contact the PatientFlow team about pricing, migration, support or partnerships. We reply fast on WhatsApp or email.">
<meta name="robots" content="index, follow, max-image-preview:large">
<link rel="canonical" href="https://crea8ivmedia.com/patientflow/contact.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="PatientFlow">
<meta property="og:title" content="Contact PatientFlow">
<meta property="og:description" content="Questions about pricing, migration or anything else — talk to a human.">
<meta property="og:url" content="https://crea8ivmedia.com/patientflow/contact.html">
<meta property="og:image" content="https://crea8ivmedia.com/patientflow/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#FE6A09">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container nav">
    <a class="brand" href="index.html"><img class="brand-logo" src="logo.png" alt="PatientFlow — by Crea8iv Media"></a>
    <button class="nav-toggle" aria-label="Toggle menu">☰</button>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="features.html">Features</a>
      <a href="pricing.html">Pricing</a>
      <a href="industries.html">Industries</a>
      <a href="demo.html">Demo</a>
      <a href="contact.html">Contact</a>
    </nav>
    <a class="nav-cta" href="demo.html">Book Demo</a>
  </div>
</header>

<section class="page-hero">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="container">
    <span class="eyebrow reveal"><span class="dot"></span> We Reply Fast</span>
    <h1 class="reveal d1">Talk to a <span class="text-grad">human.</span></h1>
    <p class="reveal d2">Questions about pricing, migration or anything else — send a message and we'll reply on WhatsApp or email.</p>
  </div>
</section>

<section class="section" style="padding-top:20px;">
  <div class="container">
    <form class="form-card reveal d1" data-lead-form="contact">
      <div class="form-grid">
        <div class="field"><label>Your Name *</label><input name="contactName" required placeholder="e.g. Dr Ali Raza"></div>
        <div class="field"><label>Clinic Name</label><input name="clinicName" placeholder="(optional)"></div>
        <div class="field"><label>Email *</label><input name="email" type="email" required placeholder="you@clinic.com"></div>
        <div class="field"><label>Phone / WhatsApp *</label><input name="phone" required placeholder="+92 300 1234567"></div>
        <div class="field full"><label>Message *</label><textarea name="message" rows="4" required placeholder="How can we help?"></textarea></div>
      </div>
      <div class="form-msg"></div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:22px;">Send Message →</button>
    </form>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-bottom" style="border-top:0;margin-top:0;padding-top:0;">
    <span>© 2026 PatientFlow by Crea8iv Media. All rights reserved.</span>
    <span><a href="index.html">Home</a></span>
  </div>
</footer>

<script src="js/site.js"></script>
</body>
</html>
